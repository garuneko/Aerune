name: Build Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      # 成功したキーチェーン作成（維持）
      - name: Install Apple Certificate
        if: matrix.os == 'macos-latest'
        run: |
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          echo "${{ secrets.CSC_LINK }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.CSC_KEY_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      # 成功したAPI Key復元（維持）
      - name: Prepare Apple API Key
        if: matrix.os == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > ${{ github.workspace }}/AuthKey.p8
          chmod 600 ${{ github.workspace }}/AuthKey.p8

      - name: Build Windows App (unsigned)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Apple証明書で署名し、API Keyで公証する
      - name: Build macOS App (signed and notarized)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ github.workspace }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          DEBUG: electron-builder,electron-notarize*
          CSC_IDENTITY_AUTO_DISCOVERY: "true"

      - name: Package FFmpeg Compliance Assets
        if: matrix.os == 'macos-latest'
        run: scripts/package-ffmpeg-compliance.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aerune-Build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/latest*.yml
            dist/ffmpeg-lgpl-darwin-arm64-*.tar.gz
            dist/ffmpeg-lgpl-darwin-arm64-*.tar.gz.sha256
          if-no-files-found: ignore

      - name: Upload to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Aerune ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/ffmpeg-lgpl-darwin-arm64-*.tar.gz
            dist/ffmpeg-lgpl-darwin-arm64-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
