name: Build Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      # API Keyのデコード（Macのみ）
      - name: Prepare Apple API Key
        if: matrix.os == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > ${{ github.workspace }}/AuthKey.p8
          chmod 600 ${{ github.workspace }}/AuthKey.p8
          head -n 1 ${{ github.workspace }}/AuthKey.p8

      # ビルドと公証
      - name: Build App
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 明示的にこれを使うように指定
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Apple API 関連
          APPLE_API_KEY: ${{ github.workspace }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # 追加：これを入れると adhoc 署名を防げる場合があります
          CSC_IDENTITY_AUTO_DISCOVERY: true 
          # デバッグログをさらに強化
          DEBUG: electron-builder,electron-notarize,macos-sign
          # Windows用設定
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aerune-Build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/latest*.yml
          if-no-files-found: ignore

      - name: Upload to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
